spring:
  application:
    name: canteen
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  sql-script-encoding: UTF-8
  datasource:
    url: jdbc:mysql://localhost:3306/canteen?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
#配置mybatis日志输出
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #配置驼峰命名转换(下划线转驼峰，记得开！！)(推荐)
    map-underscore-to-camel-case: true
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: DEBUG

canteen:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    user-secret-key: me-canteen-jwt-secret
    # 设置jwt过期时间
    user-ttl: 7200000
    # 设置前端传递过来的令牌名称
    user-token-name: token
